server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: risk-ai-ragent
  profiles:
    active: dev,local
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # ---- MySQL ----
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:risk_ai_ragent}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ---- Spring AI（聊天 + 向量化均走阿里云百炼 DashScope）----
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        # base-url 已含 /v1，须用 /chat/completions，否则会拼成 /v1/v1/chat/completions
        completions-path: /chat/completions
        options:
          model: ${OPENAI_CHAT_MODEL:qwen-plus}
          temperature: ${OPENAI_CHAT_TEMPERATURE:0.1}
      embedding:
        embeddings-path: /embeddings
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-v4}
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}
        database-name: ${MILVUS_DB:default}
        collection-name: ${MILVUS_COLLECTION:risk_knowledge}
        # text-embedding-3-small => 1536 dims. Keep in sync with the embedding model.
        embedding-dimension: ${MILVUS_DIM:1024}
        index-type: IVF_FLAT
        metric-type: COSINE
        initialize-schema: true
    mcp:
      server:
        enabled: true
        name: risk-ai-ragent-mcp
        version: 1.0.0
        type: SYNC
        instructions: |
          本 MCP Server 提供金融风控知识库 RAG 能力。
          工具：searchRiskKnowledge（向量检索）、askRiskQuestion（RAG 问答）、
          getKnowledgeBaseStats（统计）、listKnowledgeCategories（分类列表）。
          问答严格遵守内部文档，禁止编造。
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false

# ---- MyBatis-Plus ----
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.gm.riskaiRagent.entity
  mapper-locations: classpath*:/mapper/**/*.xml

# ---- Application specific settings (all tunables externalized here) ----
risk-ai:
  # Text chunking rules
  chunk:
    # Tokens per chunk
    size: 800
    # Overlapping tokens between adjacent chunks
    overlap: 150
    # jtokkit encoding used for token counting: CL100K_BASE / O200K_BASE
    encoding: CL100K_BASE
  # RAG retrieval
  rag:
    top-k: 5
    similarity-threshold: 0.5
  # 多跳检索（默认关闭，开启后问答链路自动多跳召回；MCP 单跳工具不受影响）
  multi-hop:
    enabled: false
    max-hops: 2
    sub-queries-per-hop: 2
    hop-top-k: 3
    final-top-k: 5
    use-llm-sub-query: true
  # 文档入库：办公文档走 Tika，图片走百炼视觉 OCR
  document:
    vision-model: ${RISK_AI_VISION_MODEL:qwen-vl-plus}
    ocr-prompt: |
      你是金融风控文档 OCR 助手。请完整提取图片中的全部可见文字（含表格、标题、页眉页脚），保持原有层次与条目结构；若有印章、签名、图表说明也请文字化描述。只输出识别内容，不要添加解释或总结。若图片中无可读文字，仅回复「无文字内容」。
  # Redis answer cache
  cache:
    enabled: true
    ttl-minutes: 60
    key-prefix: "risk-ai:ragent:cache:"
  # Redis fixed-window rate limiting for /risk/ragent
  rate-limit:
    enabled: true
    # Max requests allowed per window, per client IP
    max-requests: 20
    # Window length in seconds
    window-seconds: 60
    key-prefix: "risk-ai:ragent:rl:"
  # Service degradation
  degrade:
    # Fallback answer returned when the LLM is unavailable / times out
    fallback-answer: "当前问答服务繁忙或暂时不可用，请稍后重试。"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.gm.riskaiRagent: INFO
    org.springframework.ai: INFO
